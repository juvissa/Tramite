<header class="encabezado">
  <div class="encabezado-izquierda">
    <button class="sidebar-toggle" id="btnSidebarToggle" title="Menú">
      <i class="ph ph-list"></i>
    </button>
    <img src="assets/imagenes/Logo.jpg" alt="Logo" class="encabezado-logo" />
    <div class="encabezado-titulos">
      <span class="encabezado-siglas">SISTEMA SIS</span>
      <span class="encabezado-subtitulo">Trámite Documentario</span>
    </div>
  </div>

  <div class="encabezado-centro">
    <span class="encabezado-pagina" id="encabezadoPagina"></span>
    <span class="encabezado-divisor"></span>
    <span class="encabezado-ruta" id="encabezadoRuta"></span>
  </div>

  <div class="encabezado-derecha">
    <span class="encabezado-usuario" id="txtNombreUsuario"></span>
    <div class="encabezado-avatar" id="avatarIniciales"></div>
    <div class="notif-wrapper" id="notifWrapper">
      <button class="btn-notificaciones" id="btnNotificaciones" title="Notificaciones">
        <i class="ph ph-bell"></i>
        <span class="notif-badge" id="badgeNotifHeader" style="display:none;">0</span>
      </button>
      <div class="notif-dropdown" id="notifDropdown" style="display:none;">
        <div class="notif-dropdown-header">
          <span class="notif-dropdown-titulo">Notificaciones</span>
          <button class="notif-dropdown-marcar" id="btnMarcarLeidasHeader" style="display:none;">Marcar todo leído</button>
        </div>
        <div class="notif-dropdown-lista" id="notifDropdownLista">
          <div class="notif-dropdown-vacio">No hay notificaciones</div>
        </div>
        <div class="notif-dropdown-footer">
          <button class="notif-dropdown-ver-todas" id="btnVerTodasNotif">Ver todas en Agenda →</button>
        </div>
      </div>
    </div>
    <button class="btn-cerrar-sesion" id="btnCerrarSesion" title="Cerrar sesión">
      <i class="ph ph-sign-out"></i>
    </button>
  </div>
</header>
